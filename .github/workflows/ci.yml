name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore YouMentor.slnx

      - name: Build
        run: dotnet build YouMentor.slnx --no-restore

      - name: Test
        run: dotnet test YouMentor.slnx --no-restore --no-build
