name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  lint-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check Conventional Commits format
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          REGEX="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9_-]+\))?: .+"

          if [[ ! $COMMIT_MSG =~ $REGEX ]]; then
            echo "❌ Error: The commit message does not conform to the Conventional Commits format!"
            echo "Your commit: '$COMMIT_MSG'"
            echo "Expected format: <type>[optional scope]: <description>"
            exit 1
          fi
          echo "✅ The commit message is written correctly!"

  run-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore YouMentor.slnx

      - name: Build
        run: dotnet build YouMentor.slnx --no-restore

      - name: Test
        run: dotnet test YouMentor.slnx --no-restore --no-build
